---
# restore_user.yml — Restore an inactive user from /home archive.
#
# PRECONDITIONS:
#   1. User's row in users.csv has been changed to status=active
#   2. sync_users.yml has been run (which re-creates the Unix account)
#
# Usage:
#   sudo ansible-playbook -i inventories/hosts.ini restore_user.yml -e "target_user=alice"

- name: Tesla — Restore user from /home archive
  hosts: tesla
  become: yes
  gather_facts: no

  vars:
    target_user: ""

  pre_tasks:
    - name: Validate target_user
      ansible.builtin.assert:
        that: target_user | length > 0
        fail_msg: "Pass -e 'target_user=<username>'"

    - name: Confirm user exists on system (sync_users.yml should have created them)
      ansible.builtin.command: id {{ target_user }}
      register: id_check
      changed_when: false
      failed_when: id_check.rc != 0

  tasks:
    - name: List available archives
      ansible.builtin.shell: |
        ls -1t {{ archive_root }}/home_{{ target_user }}_*.tar.gz 2>/dev/null | head -5 || true
      register: archives
      changed_when: false

    - name: Show available archives
      ansible.builtin.debug:
        msg:
          - "Available archives for {{ target_user }}:"
          - "{{ archives.stdout_lines | default(['(none)']) }}"

    - name: Abort if no archive
      ansible.builtin.fail:
        msg: "No archive for {{ target_user }} in {{ archive_root }}. Cannot restore /home."
      when: archives.stdout_lines | default([]) | length == 0

    - name: Restore via tesla-restore-user (non-interactive wrapper)
      ansible.builtin.expect:
        command: /usr/local/sbin/tesla-restore-user {{ target_user }}
        responses:
          'Proceed\? \[y/N\]': 'y'
      changed_when: true

    - name: Report
      ansible.builtin.debug:
        msg:
          - "✓ Restored {{ target_user }} from archive."
          - "Note: /storage/nas/{{ target_user }} was not touched on inactive — it may still hold their data."
